// ── Countdown ─────────────────────────────────────────────────────────────
function Countdown({weddingDate}){
  const [t,st]=useState({days:0,hours:0,min:0,sec:0});
  useEffect(()=>{
    if(!weddingDate)return;
    const tick=()=>{
      const d=new Date(weddingDate)-new Date();
      if(d<=0){st({days:0,hours:0,min:0,sec:0});return;}
      st({days:Math.floor(d/86400000),hours:Math.floor((d%86400000)/3600000),min:Math.floor((d%3600000)/60000),sec:Math.floor((d%60000)/1000)});
    };
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[weddingDate]);
  if(!weddingDate)return <BB style={{textAlign:"center",padding:"24px"}}><div style={{...BT(12),fontStyle:"italic",color:P.mid}}>Renseignez votre date dans "Nous deux"</div></BB>;
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,textAlign:"center"}}>
      {[{v:t.days,l:"Jours"},{v:t.hours,l:"Heures"},{v:t.min,l:"Minutes"},{v:t.sec,l:"Secondes"}].map(({v,l})=>(
        <div key={l} style={{background:"rgba(237,213,204,0.4)",border:"1px solid rgba(210,180,165,0.4)",borderRadius:16,padding:"20px 8px",backdropFilter:"blur(6px)"}}>
          <div style={{...ST(38),color:P.rose}}>{String(v).padStart(2,"0")}</div>
          <div style={{...BT(9),textTransform:"uppercase",letterSpacing:2,marginTop:4,color:P.mid}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

// AUTH SCREEN

function AuthScreen({onAuth}){
  const [mode,setMode]=useState("login"); // login | signup | forgot
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState(null); // {type:"error"|"success", text}

  const submit=async()=>{
    if(!email||(!pwd&&mode!=="forgot")){setMsg({type:"error",text:"Veuillez remplir tous les champs."});return;}
    setLoading(true);setMsg(null);
    try{
      if(mode==="login"){
        const {error}=await sb.auth.signInWithPassword({email,password:pwd});
        if(error)throw error;
        onAuth();
      }else if(mode==="signup"){
        if(pwd.length<6){setMsg({type:"error",text:"Mot de passe trop court (6 caractères minimum)."});setLoading(false);return;}
        const {error}=await sb.auth.signUp({email,password:pwd});
        if(error)throw error;
        setMsg({type:"success",text:"Compte créé ! Vérifiez votre email pour confirmer, puis connectez-vous."});
        setMode("login");
      }else{
        const {error}=await sb.auth.resetPasswordForEmail(email);
        if(error)throw error;
        setMsg({type:"success",text:"Email de réinitialisation envoyé !"});
      }
    }catch(e){
      const msgs={"Invalid login credentials":"Email ou mot de passe incorrect.","User already registered":"Cet email est déjà utilisé.","Email not confirmed":"Confirmez votre email avant de vous connecter."};
      setMsg({type:"error",text:msgs[e.message]||e.message});
    }
    setLoading(false);
  };

  const inputStyle={width:"100%",boxSizing:"border-box",background:"rgba(255,252,248,0.6)",border:"1px solid rgba(210,185,170,0.5)",borderRadius:12,padding:"14px 18px",fontFamily:F.body,fontWeight:300,fontSize:14,color:P.dark,marginBottom:12,backdropFilter:"blur(4px)"};

    <div style={{minHeight:"100vh",background:"linear-gradient(165deg,#F0E8DE 0%,#EDE0D4 35%,#E8D8CC 65%,#F0E4D8 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 24px",position:"relative",overflow:"hidden"}}>
      <WatercolorBg/>
      <div style={{position:"absolute",top:0,right:0,pointerEvents:"none"}}><FloralCorner size={240} color="#A87858" opacity={0.2}/></div>
      <div style={{position:"absolute",bottom:0,left:0,pointerEvents:"none",transform:"rotate(180deg)"}}><FloralCorner size={180} color="#B86870" opacity={0.15}/></div>

      <div style={{position:"relative",zIndex:2,width:"100%",maxWidth:400}}>
        {/* Titre */}
        <div className="fu1" style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontFamily:F.script,fontStyle:"italic",fontSize:52,color:P.dark,lineHeight:0.95}}>Andro iray</div>
          <div style={{fontFamily:F.script,fontStyle:"italic",fontSize:64,color:P.gold,lineHeight:0.9}}>toa zato</div>
          <div style={{marginTop:14}}><OilStroke color={P.blushMd} opacity={0.6} height={5}/></div>
          <div style={{fontFamily:F.body,fontWeight:300,fontSize:10,letterSpacing:2.5,color:P.mid,marginTop:10,textTransform:"uppercase"}}>Mon carnet de mariage</div>
        </div>

        {/* Card auth */}
        <div className="fu2" style={{background:"rgba(255,252,248,0.78)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderRadius:20,border:"1px solid rgba(220,200,185,0.5)",boxShadow:"0 8px 40px rgba(160,120,80,0.12)",padding:"32px 32px 28px"}}>
          {/* Tabs */}
          <div style={{display:"flex",marginBottom:24,borderBottom:`1px solid ${P.line}`}}>
            {mode!=="forgot"&&[{id:"login",l:"Se connecter"},{id:"signup",l:"Créer un compte"}].map(t=>(
              <button key={t.id} onClick={()=>{setMode(t.id);setMsg(null);}} style={{flex:1,background:"none",border:"none",borderBottom:`2px solid ${mode===t.id?P.rose:"transparent"}`,padding:"10px 0 12px",fontFamily:F.body,fontWeight:mode===t.id?400:300,fontSize:13,color:mode===t.id?P.rose:P.mid,cursor:"pointer",transition:"all .2s"}}>{t.l}</button>
            ))}
            {mode==="forgot"&&<div style={{fontFamily:F.script,fontStyle:"italic",fontSize:18,color:P.dark,paddingBottom:12}}>Mot de passe oublié</div>}
          </div>

          {/* Message */}
          {msg&&(
            <div style={{background:msg.type==="error"?"rgba(184,104,112,0.12)":"rgba(100,160,100,0.12)",border:`1px solid ${msg.type==="error"?"rgba(184,104,112,0.3)":"rgba(100,160,100,0.3)"}`,borderRadius:10,padding:"10px 14px",marginBottom:16,fontFamily:F.body,fontWeight:300,fontSize:12,color:msg.type==="error"?P.roseDk:"#3A7A3A"}}>
              {msg.text}
            </div>
          )}

          {/* Inputs */}
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" style={inputStyle} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          {mode!=="forgot"&&<input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Mot de passe" style={inputStyle} onKeyDown={e=>e.key==="Enter"&&submit()}/>}

          {/* Submit */}
          <button onClick={submit} disabled={loading} style={{width:"100%",background:`linear-gradient(135deg,${P.gold},#A07040)`,color:"rgba(255,252,245,0.96)",border:"none",borderRadius:50,padding:"15px",cursor:loading?"not-allowed":"pointer",fontFamily:F.body,fontWeight:300,fontSize:12,letterSpacing:3,textTransform:"uppercase",boxShadow:"0 6px 24px rgba(160,110,50,0.28)",marginTop:4,opacity:loading?0.8:1,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            {loading&&<span className="spinner"/>}
            {mode==="login"?"Se connecter":mode==="signup"?"Créer mon compte":"Envoyer le lien"}
          </button>

          {/* Forgot link */}
          {mode==="login"&&<div style={{textAlign:"center",marginTop:14}}>
            <span onClick={()=>{setMode("forgot");setMsg(null);}} style={{fontFamily:F.body,fontWeight:300,fontSize:11,color:P.mid,cursor:"pointer",textDecoration:"underline",textDecorationColor:P.line}}>Mot de passe oublié ?</span>
          </div>}
          {mode==="forgot"&&<div style={{textAlign:"center",marginTop:14}}>
            <span onClick={()=>{setMode("login");setMsg(null);}} style={{fontFamily:F.body,fontWeight:300,fontSize:11,color:P.mid,cursor:"pointer",textDecoration:"underline",textDecorationColor:P.line}}>← Retour à la connexion</span>
          </div>}
        </div>

        <div className="fu2" style={{textAlign:"center",marginTop:18,fontFamily:F.body,fontWeight:300,fontSize:10,color:P.mid,letterSpacing:1.5,opacity:0.6}}>
          Vodiondry · Fisoratana · Fanamasinana
        </div>
      </div>
    </div>
  );
}

function InstallButton() {
  const [showGuide, setShowGuide] = React.useState(false);
  const [prompt, setPrompt] = React.useState(null);
  const [installed, setInstalled] = React.useState(false);

  React.useEffect(() => {
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); setPrompt(e); });
    window.addEventListener('appinstalled', () => setInstalled(true));
    if (window.matchMedia('(display-mode: standalone)').matches) setInstalled(true);
  }, []);

  if (installed) return null;

  const handleClick = async () => {
    if (prompt) {
      prompt.prompt();
      const { outcome } = await prompt.userChoice;
      if (outcome === 'accepted') setInstalled(true);
      setPrompt(null);
    } else {
      setShowGuide(true);
    }
  };

  return (
    <>
      <button onClick={handleClick} style={{background:`linear-gradient(135deg,${P.gold},#A07040)`,color:"white",border:"none",borderRadius:30,padding:"6px 14px",fontFamily:F.body,fontSize:10,cursor:"pointer",letterSpacing:1,whiteSpace:"nowrap",boxShadow:"0 2px 10px rgba(160,110,50,0.25)"}}>
        📲 Installer
      </button>
      {showGuide && <InstallGuide onClose={()=>setShowGuide(false)}/>}
    </>
  );
}

function NotifButton({weddingDate, coupleName}) {
  const [status, setStatus] = React.useState(
    typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'
  );
  const [done, setDone] = React.useState(false);

  const activate = async () => {
    const perm = await window.AndroReminders?.requestPermission();
    setStatus(perm);
    if (perm === 'granted' && weddingDate) {
      await window.AndroReminders?.scheduleWeddingAlarm(weddingDate, coupleName);
      window.AndroReminders?.startPolling();
      setDone(true);
      setTimeout(() => setDone(false), 3000);
    }
  };

  if (status === 'unsupported') return null;

  return (
    <button onClick={activate} style={{
      background: status === 'granted' ? 'rgba(100,160,100,0.15)' : 'transparent',
      color: status === 'granted' ? '#3A7A3A' : P.mid,
      border: `1px solid ${status === 'granted' ? 'rgba(100,160,100,0.4)' : P.line}`,
      borderRadius: 30, padding: '6px 14px', fontFamily: F.body,
      fontSize: 10, cursor: 'pointer', whiteSpace: 'nowrap'
    }} title={status === 'granted' ? 'Rappels activés' : 'Activer les rappels'}>
      {done ? '✓ Rappels activés !' : status === 'granted' ? '🔔 Rappels ON' : '🔕 Rappels'}
    </button>
  );
}

// RESET PASSWORD SCREEN
// ══════════════════════════════════════════════════════════════════════════
function ResetPasswordScreen({onDone}){
  const [pwd,setPwd]=useState("");
  const [pwd2,setPwd2]=useState("");
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState(null);

  const submit=async()=>{
    if(!pwd||!pwd2){setMsg({type:"error",text:"Veuillez remplir les deux champs."});return;}
    if(pwd!==pwd2){setMsg({type:"error",text:"Les mots de passe ne correspondent pas."});return;}
    if(pwd.length<6){setMsg({type:"error",text:"Mot de passe trop court (6 caractères minimum)."});return;}
    setLoading(true);setMsg(null);
    const {error}=await sb.auth.updateUser({password:pwd});
    setLoading(false);
    if(error){setMsg({type:"error",text:error.message});return;}
    setMsg({type:"success",text:"Mot de passe modifié ! Redirection..."});
    setTimeout(()=>onDone(),1500);
  };

  const inputStyle={width:"100%",boxSizing:"border-box",background:"rgba(255,252,248,0.6)",border:"1px solid rgba(210,185,170,0.5)",borderRadius:12,padding:"14px 18px",fontFamily:F.body,fontWeight:300,fontSize:14,color:P.dark,marginBottom:12,backdropFilter:"blur(4px)"};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(165deg,#F0E8DE 0%,#EDE0D4 35%,#E8D8CC 65%,#F0E4D8 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 24px",position:"relative",overflow:"hidden"}}>
      <WatercolorBg/>
      <div style={{position:"absolute",top:0,right:0,pointerEvents:"none"}}><FloralCorner size={240} color="#A87858" opacity={0.2}/></div>
      <div style={{position:"relative",zIndex:2,width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontFamily:F.script,fontStyle:"italic",fontSize:52,color:P.dark,lineHeight:0.95}}>Andro iray</div>
          <div style={{fontFamily:F.script,fontStyle:"italic",fontSize:64,color:P.gold,lineHeight:0.9}}>toa zato</div>
          <div style={{marginTop:14}}><OilStroke color={P.blushMd} opacity={0.6} height={5}/></div>
        </div>
        <div style={{background:"rgba(255,252,248,0.78)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderRadius:20,border:"1px solid rgba(220,200,185,0.5)",boxShadow:"0 8px 40px rgba(160,120,80,0.12)",padding:"32px 32px 28px"}}>
          <div style={{fontFamily:F.script,fontStyle:"italic",fontSize:22,color:P.dark,marginBottom:6}}>Nouveau mot de passe</div>
          <OilStroke color={P.blush} opacity={0.5} height={4}/>
          <div style={{...BT(12),color:P.mid,marginTop:12,marginBottom:20}}>Choisissez votre nouveau mot de passe</div>

          {msg&&(
            <div style={{background:msg.type==="error"?"rgba(184,104,112,0.12)":"rgba(100,160,100,0.12)",border:`1px solid ${msg.type==="error"?"rgba(184,104,112,0.3)":"rgba(100,160,100,0.3)"}`,borderRadius:10,padding:"10px 14px",marginBottom:16,fontFamily:F.body,fontWeight:300,fontSize:12,color:msg.type==="error"?P.roseDk:"#3A7A3A"}}>
              {msg.text}
            </div>
          )}

          <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Nouveau mot de passe" style={inputStyle}/>
          <input type="password" value={pwd2} onChange={e=>setPwd2(e.target.value)} placeholder="Confirmer le mot de passe" style={inputStyle} onKeyDown={e=>e.key==="Enter"&&submit()}/>

          <button onClick={submit} disabled={loading} style={{width:"100%",background:`linear-gradient(135deg,${P.gold},#A07040)`,color:"rgba(255,252,245,0.96)",border:"none",borderRadius:50,padding:"15px",cursor:loading?"not-allowed":"pointer",fontFamily:F.body,fontWeight:300,fontSize:12,letterSpacing:3,textTransform:"uppercase",boxShadow:"0 6px 24px rgba(160,110,50,0.28)",marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            {loading&&<span className="spinner"/>}
            Enregistrer
          </button>
        </div>
      </div>
    </div>
  );
}

// ROOT
// ══════════════════════════════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(undefined);
  const [isReset,setIsReset]=useState(false);

  useEffect(()=>{
    // Détecter si on arrive depuis un lien de réinitialisation
    const hash=window.location.hash;
    if(hash.includes("type=recovery")||hash.includes("access_token")&&hash.includes("type=recovery")){
      setIsReset(true);
    }
    sb.auth.getSession().then(({data:{session}})=>setUser(session?.user||null));
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==="PASSWORD_RECOVERY"){setIsReset(true);}
      setUser(session?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  if(user===undefined)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(165deg,#F0E8DE,#EDE0D4)"}}>
      <WatercolorBg/>
      <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
        <span className="spinner" style={{width:36,height:36,borderWidth:3,borderColor:"rgba(184,137,90,0.3)",borderTopColor:P.gold}}/>
      </div>
    </div>
  );

  // Afficher le formulaire de réinitialisation si on arrive depuis le lien email
  if(isReset&&user)return <ResetPasswordScreen onDone={()=>{setIsReset(false);window.location.hash="";}}/>;
  if(!user)return <AuthScreen onAuth={()=>sb.auth.getSession().then(({data:{session}})=>setUser(session?.user||null))}/>;
  return <MainApp user={user} onSignOut={async()=>{await sb.auth.signOut();setUser(null);}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
// ── Service Worker Registration ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        console.log('SW registered:', reg.scope);
        // Background sync every 15 min
        if ('periodicSync' in reg) {
          reg.periodicSync.register('check-reminders', { minInterval: 15 * 60 * 1000 }).catch(() => {});
        }
      })
      .catch(err => console.log('SW error:', err));
  });
}

// ── IndexedDB helper for reminders ───────────────────────────────────────
window.AndroReminders = {
  openDB: () => new Promise((resolve, reject) => {
    const req = indexedDB.open('andro-reminders', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('reminders')) {
        db.createObjectStore('reminders', { keyPath: 'id' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  }),

  addReminder: async (id, title, body, time) => {
    const db = await window.AndroReminders.openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('reminders', 'readwrite');
      tx.objectStore('reminders').put({ id, title, body, time, sent: false });
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  },

  deleteReminder: async (id) => {
    const db = await window.AndroReminders.openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('reminders', 'readwrite');
      tx.objectStore('reminders').delete(id);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  },

  getAll: async () => {
    const db = await window.AndroReminders.openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('reminders', 'readonly');
      const req = tx.objectStore('reminders').getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  },

  requestPermission: async () => {
    if (!('Notification' in window)) return 'unsupported';
    if (Notification.permission === 'granted') return 'granted';
    if (Notification.permission === 'denied') return 'denied';
    const result = await Notification.requestPermission();
    return result;
  },

  scheduleWeddingAlarm: async (weddingDate, coupleName) => {
    if (!weddingDate) return;
    const perm = await window.AndroReminders.requestPermission();
    if (perm !== 'granted') return;

    const d = new Date(weddingDate);

    // J-30
    const minus30 = new Date(d); minus30.setDate(d.getDate() - 30); minus30.setHours(9, 0, 0, 0);
    if (minus30 > new Date()) {
      await window.AndroReminders.addReminder('j-30', '🌸 30 jours avant votre mariage !', `${coupleName || 'Votre grand jour'} approche — vérifiez votre to-do !`, minus30.getTime());
    }

    // J-7
    const minus7 = new Date(d); minus7.setDate(d.getDate() - 7); minus7.setHours(9, 0, 0, 0);
    if (minus7 > new Date()) {
      await window.AndroReminders.addReminder('j-7', '💍 Plus que 7 jours !', 'Confirmez vos prestataires et préparez votre kit survie 💼', minus7.getTime());
    }

    // J-1
    const minus1 = new Date(d); minus1.setDate(d.getDate() - 1); minus1.setHours(8, 0, 0, 0);
    if (minus1 > new Date()) {
      await window.AndroReminders.addReminder('j-1', '🎊 Demain c\'est votre mariage !', 'Reposez-vous bien ce soir ♡ Tout est prêt !', minus1.getTime());
    }

    // Jour J — 6h du matin
    const jourJ = new Date(d); jourJ.setHours(6, 0, 0, 0);
    if (jourJ > new Date()) {
      await window.AndroReminders.addReminder('jour-j', '☀️ C\'est aujourd\'hui !', `Andro iray toa zato — Votre grand jour est arrivé ♡`, jourJ.getTime());
    }

    // Vérifier toutes les minutes si des notifs sont dues
    window.AndroReminders.startPolling();
  },

  startPolling: () => {
    if (window._androPolling) return;
    window._androPolling = setInterval(async () => {
      if (Notification.permission !== 'granted') return;
      const reminders = await window.AndroReminders.getAll();
      const now = Date.now();
      for (const r of reminders) {
        if (r.time <= now && !r.sent) {
          new Notification(r.title, {
            body: r.body,
            icon: '/icon-192.png',
            badge: '/icon-192.png',
            vibrate: [200, 100, 200],
            tag: r.id
          });
          const db = await window.AndroReminders.openDB();
          const tx = db.transaction('reminders', 'readwrite');
          const store = tx.objectStore('reminders');
          store.put({ ...r, sent: true });
        }
      }
    }, 60000); // check every minute
  }
};
</script>

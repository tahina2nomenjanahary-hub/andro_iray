// ── Textures SVG (painted/organic) ────────────────────────────────────────

// Fond aquarelle organique — grandes taches douces
function WatercolorBg() {
  return (
    <svg style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}} preserveAspectRatio="xMidYMid slice" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
        <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
        <filter id="blur3"><feGaussianBlur stdDeviation="25"/></filter>
        <filter id="noise">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0"/>
          <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
          <feComposite in="noisy" in2="SourceGraphic" operator="in"/>
        </filter>
      </defs>
      {/* Grande tache beige haut gauche */}
      <ellipse cx="150" cy="120" rx="320" ry="240" fill="#DDD0C0" opacity="0.35" filter="url(#blur2)"/>
      {/* Tache rose centre */}
      <ellipse cx="800" cy="300" rx="280" ry="200" fill="#D4A898" opacity="0.22" filter="url(#blur2)"/>
      {/* Tache dorée droite */}
      <ellipse cx="1100" cy="150" rx="220" ry="180" fill="#C8AA78" opacity="0.18" filter="url(#blur1)"/>
      {/* Tache bas gauche */}
      <ellipse cx="200" cy="780" rx="300" ry="200" fill="#C8B8A8" opacity="0.25" filter="url(#blur2)"/>
      {/* Tache rose bas centre */}
      <ellipse cx="700" cy="820" rx="260" ry="160" fill="#D0A090" opacity="0.18" filter="url(#blur2)"/>
      {/* Tache milieu subtile */}
      <ellipse cx="550" cy="450" rx="350" ry="280" fill="#EAD8C8" opacity="0.15" filter="url(#blur2)"/>
      {/* Petites touches peinture */}
      <ellipse cx="380" cy="250" rx="80" ry="55" fill="#C8A888" opacity="0.12" filter="url(#blur3)" transform="rotate(-20,380,250)"/>
      <ellipse cx="900" cy="620" rx="100" ry="60" fill="#D0A898" opacity="0.14" filter="url(#blur3)" transform="rotate(15,900,620)"/>
      <ellipse cx="60" cy="480" rx="70" ry="90" fill="#C0B098" opacity="0.13" filter="url(#blur3)"/>
    </svg>
  );
}

// Texture peinture huile — traits organiques fins (section headers)
function OilStroke({color="#D9B4A8",opacity=0.35,width="100%",height=6}) {
  return (
    <svg style={{display:"block",width,height,overflow:"visible"}} viewBox="0 0 400 10" preserveAspectRatio="none">
      <path d="M2,6 C30,3 70,7 120,5 C170,3 200,7 250,5 C300,3 340,7 398,5" fill="none" stroke={color} strokeWidth="5" strokeLinecap="round" opacity={opacity}/>
      <path d="M2,7 C40,5 80,8 130,6 C180,4 220,8 270,6 C320,4 360,8 398,6" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" opacity={opacity*0.5}/>
    </svg>
  );
}

// Ornement floral SVG minimaliste (coins landing)
function FloralCorner({size=220,mirror=false,flip=false,color="#C4907E",opacity=0.18}) {
  const s=`scale(${mirror?-1:1},${flip?-1:1})`;
  const tx=mirror?-size:0; const ty=flip?-size:0;
  return (
    <svg width={size} height={size} viewBox="0 0 220 220" style={{display:"block",opacity}}>
      <g transform={`translate(${tx},${ty}) ${s}`} fill="none" stroke={color} strokeLinecap="round" strokeLinejoin="round">
        {/* Grande feuille ventail gingko */}
        <g transform="translate(160,30)">
          {[-40,-25,-10,5,20,35].map((a,i)=>(
            <path key={i} d={`M0,0 C${Math.sin((a+30)*Math.PI/180)*30},${-50-i*4} ${Math.sin(a*Math.PI/180)*35},${-75-i*3} ${Math.cos(a*Math.PI/180)*20},${-95-i*2}`}
              strokeWidth={1.8-i*0.1} strokeOpacity={0.9-i*0.05}/>
          ))}
          <path d="M0,0 C-5,10 -3,20 0,25" strokeWidth="1.4"/>
        </g>
        {/* Feuille secondaire */}
        <g transform="translate(110,70) rotate(-30)">
          {[-25,-10,5,20].map((a,i)=>(
            <path key={i} d={`M0,0 C${Math.sin((a+20)*Math.PI/180)*20},${-35-i*3} ${Math.sin(a*Math.PI/180)*25},${-55-i*2} ${Math.cos(a*Math.PI/180)*15},${-70}`}
              strokeWidth={1.4-i*0.1} strokeOpacity={0.7}/>
          ))}
        </g>
        {/* Petite feuille */}
        <g transform="translate(185,80) rotate(20)">
          {[-15,0,15].map((a,i)=>(
            <path key={i} d={`M0,0 C${Math.sin(a*Math.PI/180)*15},${-25-i*2} ${Math.sin(a*Math.PI/180)*18},${-40} ${Math.cos(a*Math.PI/180)*10},${-50}`}
              strokeWidth="1" strokeOpacity="0.55"/>
          ))}
        </g>
        {/* Tige */}
        <path d="M160,30 C150,60 140,90 130,130 C120,160 115,180 118,210" strokeWidth="1.2" strokeOpacity="0.45"/>
        {/* Petite fleur */}
        <g transform="translate(50,170)">
          {[0,60,120,180,240,300].map((a,i)=>(
            <path key={i} d={`M0,0 L${Math.cos(a*Math.PI/180)*14},${Math.sin(a*Math.PI/180)*14}`}
              strokeWidth="1" strokeOpacity="0.5"/>
          ))}
          <circle cx="0" cy="0" r="4" strokeWidth="1" strokeOpacity="0.6"/>
        </g>
        {/* Ligne décorative */}
        <path d="M20,200 C50,195 80,198 110,194 C140,190 165,193 200,190" strokeWidth="0.8" strokeOpacity="0.3"/>
      </g>
    </svg>
  );
}

function Lbl({c}){return <div style={{fontFamily:F.body,fontWeight:300,fontSize:9,color:P.rose,textTransform:"uppercase",letterSpacing:2.5,marginBottom:5}}>{c}</div>;}

}

function TA({label,value,onChange,rows=5,placeholder=""}){

  return(
    <div style={{marginBottom:16}}>
      {label&&<Lbl c={label}/>}

          style={{position:"relative",zIndex:1,width:"100%",border:"none",background:"transparent",padding:"14px 16px",fontFamily:F.script,fontStyle:"italic",fontSize:15,color:P.dark,outline:"none",resize:"vertical",lineHeight:2,boxSizing:"border-box"}}
          onFocus={()=>sf(true)} onBlur={()=>sf(false)}/>
      </div>
    </div>

function BC({label,checked,onChange}){
  return(

      </div>
      <div style={{...BT(13),color:checked?P.mid:P.dark,textDecoration:checked?"line-through":"none",transition:"all .2s"}}>{label}</div>
    </div>
  );
}

function Tg({label,active,onClick}){
  return(
    <span onClick={onClick} style={{display:"inline-block",padding:"6px 15px",borderRadius:30,border:`1.5px solid ${active?P.rose:P.line}`,background:active?"rgba(184,104,112,0.12)":"rgba(255,252,248,0.5)",color:active?P.roseDk:P.mid,fontFamily:F.body,fontWeight:300,fontSize:12,cursor:"pointer",margin:"3px",transition:"all .2s"}}>{label}</span>
  );
}

// ── Countdown ─────────────────────────────────────────────────────────────
function Countdown({weddingDate}){
  const [t,st]=useState({days:0,hours:0,min:0,sec:0});
  useEffect(()=>{
    if(!weddingDate)return;
    const tick=()=>{
      const d=new Date(weddingDate)-new Date();
      if(d<=0){st({days:0,hours:0,min:0,sec:0});return;}
      st({days:Math.floor(d/86400000),hours:Math.floor((d%86400000)/3600000),min:Math.floor((d%3600000)/60000),sec:Math.floor((d%60000)/1000)});
    };
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[weddingDate]);
  if(!weddingDate)return <BB style={{textAlign:"center",padding:"24px"}}><div style={{...BT(12),fontStyle:"italic",color:P.mid}}>Renseignez votre date dans "Nous deux" pour voir le compte à rebours</div></BB>;
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,textAlign:"center"}}>
      {[{v:t.days,l:"Jours"},{v:t.hours,l:"Heures"},{v:t.min,l:"Minutes"},{v:t.sec,l:"Secondes"}].map(({v,l})=>(
        <div key={l} style={{background:"rgba(237,213,204,0.4)",border:"1px solid rgba(210,180,165,0.4)",borderRadius:16,padding:"20px 8px",backdropFilter:"blur(6px)"}}>
          <div style={{...ST(38),color:P.rose}}>{String(v).padStart(2,"0")}</div>
          <div style={{...BT(9),textTransform:"uppercase",letterSpacing:2,marginTop:4,color:P.mid}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

              {JJT.map(t=>subBtn(t.id,jTab,setJTab,t.l))}
            </div>
            {jTab==="countdown"&&<Card><CI><SHead script="Compte à rebours" display="Jusqu'à votre grand jour"/><Countdown weddingDate={couple.date}/>{couple.date&&<div style={{textAlign:"center",marginTop:16,fontFamily:F.script,fontStyle:"italic",fontSize:16,color:P.mid}}>{new Date(couple.date).toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>}</CI></Card>}
            {jTab==="planning"&&<Card><CI>
              <SHead script="Planning du Jour J" display="Heure par heure"/>
              {pjj.map((row,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,marginBottom:9,padding:"8px 0",borderBottom:`1px solid rgba(220,200,185,0.25)`}}>
                  <div style={{width:26,height:26,borderRadius:"50%",background:i%2===0?"rgba(237,213,204,0.6)":"rgba(222,200,152,0.6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:10,color:P.rose,fontFamily:F.body}}>{i+1}</span>
                  </div>
                  <div style={{...BT(13),color:P.dark,flex:1}}>{row.m}</div>
                  <input value={row.h} onChange={e=>setPjj(p=>p.map((r,j)=>j===i?{...r,h:e.target.value}:r))} placeholder="__ h __"
                    style={{width:75,border:"none",borderBottom:`1px solid ${P.line}`,background:"transparent",padding:"2px 0",fontFamily:F.script,fontStyle:"italic",fontSize:14,color:P.rose,outline:"none",textAlign:"center"}}/>
                </div>
              ))}
            </CI></Card>}
            {jTab==="contacts"&&<Card><CI>
              <SHead script="Contacts urgents" display="À imprimer pour les témoins"/>
              <BB style={{marginBottom:16}}><div style={{...BT(11),fontStyle:"italic",textAlign:"center",color:P.mid}}>✦ Imprimez cette page et donnez-la à vos témoins le matin du mariage</div></BB>
              {urg.map((c,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"150px 1fr 1fr",gap:"0 16px",alignItems:"end",marginBottom:12,paddingBottom:10,borderBottom:`1px solid rgba(220,200,185,0.25)`}}>
                  <div style={{fontFamily:F.body,fontWeight:400,fontSize:12,color:P.rose,paddingTop:16}}>{c.role}</div>
                  <IL label="Nom" value={c.nom} onChange={v=>updU(i,"nom",v)}/>
                  <IL label="Téléphone" value={c.tel} onChange={v=>updU(i,"tel",v)} placeholder="📞"/>
                </div>
              ))}
            </CI></Card>}
            {jTab==="checklist"&&<Card><CI>
              <SHead script="Liste de vérification finale" display="Avant de partir"/>
              <BB style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontFamily:F.script,fontStyle:"italic",fontSize:16,color:P.rose}}>{jjCheck.filter(t=>t.done).length} / {jjCheck.length}</div>
                  <div style={{width:120,height:4,background:"rgba(255,255,255,0.5)",borderRadius:2,overflow:"hidden"}}>
                    <div style={{width:`${jjCheck.filter(t=>t.done).length/jjCheck.length*100}%`,height:"100%",background:P.rose,borderRadius:2}}/>
                  </div>
                </div>
              </BB>
              {jjCheck.map((t,i)=><BC key={i} label={t.label} checked={t.done} onChange={v=>setJjCheck(p=>p.map((x,j)=>j===i?{...x,done:v}:x))}/>)}
            </CI></Card>}
            {jTab==="voeux"&&<div>
              <Card><CI><SHead script="Vœux de la mariée" color={P.blush}/><TA value={voeux.mariee} onChange={v=>setVoeux(p=>({...p,mariee:v}))} rows={12} placeholder="Chers amis, chère famille..."/></CI></Card>
              <Card><CI><SHead script="Vœux du marié" color={P.goldLt}/><TA value={voeux.marie} onChange={v=>setVoeux(p=>({...p,marie:v}))} rows={12} placeholder="Mes amis, ma famille..."/></CI></Card>
            </div>}
            {jTab==="kit"&&<Card><CI>
              <SHead script="Kit survie mariée" display="À préparer la veille"/>
              <BB style={{marginBottom:16}}><div style={{...BT(11),fontStyle:"italic",textAlign:"center",color:P.mid}}>💼 Confiez ce pochon à votre témoin principale</div></BB>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
                {kit.map((t,i)=><BC key={i} label={t.label} checked={t.done} onChange={v=>setKit(p=>p.map((x,j)=>j===i?{...x,done:v}:x))}/>)}
              </div>
            </CI></Card>}
          </div>
        )}

        {/* NOTES */}
        {tab==="notes"&&(
          <div>
            {[{key:"general",script:"Notes libres",bc:P.blush,rows:8,ph:"Pensées, idées, questions..."},{key:"beauty",script:"Beauté & soins",bc:P.blushMd,rows:5,ph:"Rendez-vous, produits, soins..."},{key:"honeymoon",script:"Voyage de noces",bc:P.goldLt,rows:5,ph:"Destination, hôtel, activités..."}].map(s=>(
              <Card key={s.key}><CI><SHead script={s.script} color={s.bc}/><TA value={notes[s.key]} onChange={v=>setNotes(p=>({...p,[s.key]:v}))} rows={s.rows} placeholder={s.ph}/></CI></Card>
            ))}
          </div>
        )}

      </div>
      <div style={{textAlign:"center",padding:"16px 0 40px",position:"relative",zIndex:1}} className="no-print">
        <div style={{fontFamily:F.script,fontStyle:"italic",fontSize:16,color:P.rose,opacity:0.7}}>♡ Andro iray toa zato</div>
      </div>
    </div>
  );
}

function App(){
  const [started,setStarted]=useState(false);
  if(!started)return <Landing onStart={()=>setStarted(true)}/>;
  return <MainApp/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
